<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register</title>
        <link rel="icon" href="/images/connect-icon.png">
        <link rel="stylesheet" href="/css/Register.css">
</head>

<body>
        <div class="main-container">

                <div class="left">
                        <div>
                                <img src="/images/Logo design for Connect platform.png" alt="logo">
                                <h1>Reconnect. Resolve. Renew.</h1>
                                <p>Lets get you back to love.
                                        <span>(Privately, Securly, and consciously)</span>
                        </div>
                </div>


                <div class="right">
                        <form action="#" method="post">
                                <label for="one">Name</label><br>
                                <input type="text" id="one" name="name" placeholder="Name" required><br>
                                <label for="two">Password</label><br>
                                <input type="password" id="two" name="password" placeholder="Password" required><br>
                                <label for="three">Email</label><br>
                                <input type="email" id="three" name="email" placeholder="Email" required><br>
                                <label for="text-area">Describe a little bit of yourself</label><br>
                                <input type="textarea" id="text-area" name="about-self" placeholder="Optional"><br>
                                <p><button type="submit">Next ➡</button></p>
                        </form>
                </div>
        </div>
</body>

</html>
