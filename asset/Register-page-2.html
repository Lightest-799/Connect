<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" href="/images/connect-icon.png">
    <link rel="stylesheet" href="/css/Register-page-2.css">
</head>

<body>
    <div class="main-container">
        <div class="left">
            <div>
                <img src="/images/Logo design for Connect platform.png" alt="logo">
                <h1>Reconnect. Resolve. Renew.</h1>
                <p>Lets get you back to love.
                    <span>(Privately, Securly, and consciously)</span>
            </div>
        </div>



        <div class="right">

            <select class="revel" name="peronality">
                <option value="">I am joining as</option>
                <option value="Individual">Individual</option>
                <option value="Couple">Couple</option>
            </select>
            <br>

            <select class="revel" name="status">
                <option value="">Select your status</option>
                <option value="dating">In a relationship</option>
                <option value="married">Married</option>
                <option value="engaged">Engaged</option>
                <option value="separated">Separated</option>
                <option value="complicated">It's complicated</option>
            </select>
            <br>

            <select class="revel" name="concern">
                <option value="">Select main concern</option>
                <option value="communication">Communication issues</option>
                <option value="trust">Trust issues</option>
                <option value="arguments">Frequent arguments</option>
                <option value="distance">Emotional distance</option>
                <option value="infidelity">Infidelity</option>
                <option value="growth">Improve relationship</option>
            </select>
            <br>

            <select class="revel" name="session type">
                <option value="">Choose session type</option>
                <option value="online">Online (video/chat)</option>
                <option value="physical">In-person</option>
            </select>
            <br>

            <select class="revel" name="Therapist preference">
                <option value="">Therapist preference</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="no_preference">No preference</option>
            </select>
            <br>

            <select class="revel" name="availability">
                <option value="">Select availability</option>
                <option value="weekdays">Weekdays</option>
                <option value="evenings">Evenings</option>
                <option value="weekends">Weekends</option>
                <option value="flexible">Flexible</option>
            </select>


        </div>


    </div>
</body>

</html>
